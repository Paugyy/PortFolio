<!-- Overlay + Panel procédure -->
<div class="overlay" id="resOverlay"></div>
<aside class="res-panel" id="resPanel" role="dialog" aria-modal="true" aria-label="Procédure">
  <div class="res-panel__header">
    <h2 class="res-panel__title" id="resPanelTitle"></h2>
    <button class="popup__close" id="resPanelClose" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

</aside>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

const cards      = document.querySelectorAll('.res-card');
const filters    = document.querySelectorAll('.res-filter');
const search     = document.getElementById('resSearch');
const noResult   = document.getElementById('resNoResult');
const querySpan  = document.getElementById('resQuery');
const overlay    = document.getElementById('resOverlay');
const panel      = document.getElementById('resPanel');
const panelTitle = document.getElementById('resPanelTitle');
const panelBody  = document.getElementById('resPanelBody');
const panelClose = document.getElementById('resPanelClose');

/* Panel */
function openPanel(title, content) {
  panelTitle.textContent = title;
  panelBody.innerHTML    = content;
  overlay.classList.add('is-visible');
  panel.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}
function closePanel() {
  overlay.classList.remove('is-visible');
  panel.classList.remove('is-open');
  document.body.style.overflow = '';
}
panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

cards.forEach(c => c.addEventListener('click', () => openPanel(c.dataset.title, c.dataset.content)));

/* Filtres + recherche */
let activeCat = 'all';
filters.forEach(btn => {
  btn.addEventListener('click', () => {
    filters.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});
search.addEventListener('input', applyFilters);
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();search.focus();}
});

function applyFilters() {
  const q = search.value.trim().toLowerCase();
  let n = 0;
  cards.forEach(c => {
    const mc = activeCat==='all' || c.dataset.cat===activeCat;
    const mq = !q || c.dataset.title.toLowerCase().includes(q) || c.querySelector('.res-card__desc').textContent.toLowerCase().includes(q);
    c.style.display = mc&&mq ? '' : 'none';
    if(mc&&mq) n++;
  });
  noResult.style.display = n===0 ? 'block' : 'none';
  querySpan.textContent  = q||activeCat;
}
</script>
