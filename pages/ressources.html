    <!-- ══ SYSTÈME ══ -->
    <button class="res-card" data-cat="systeme" data-title="Installation Debian"
      data-content="&lt;h2&gt;Installation Debian 12&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Système&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Prérequis&lt;/h3&gt;&lt;ul&gt;&lt;li&gt;ISO Debian 12 Bookworm — debian.org&lt;/li&gt;&lt;li&gt;VirtualBox / Proxmox ou machine physique&lt;/li&gt;&lt;li&gt;Minimum 20 Go disque, 2 Go RAM&lt;/li&gt;&lt;/ul&gt;&lt;h3&gt;Création VM VirtualBox&lt;/h3&gt;&lt;pre&gt;Nouvelle VM → Linux → Debian 64-bit&lt;br&gt;RAM : 2048 Mo minimum&lt;br&gt;Disque : VDI dynamique 20 Go&lt;br&gt;Réseau : Adaptateur pont (Bridged)&lt;/pre&gt;&lt;h3&gt;Installation&lt;/h3&gt;&lt;ol&gt;&lt;li&gt;Démarrer sur l'ISO → Graphical Install&lt;/li&gt;&lt;li&gt;Langue : Français / Fuseau : Europe/Paris&lt;/li&gt;&lt;li&gt;Partitionnement : méthode guidée — disque entier&lt;/li&gt;&lt;li&gt;Miroir réseau : deb.debian.org&lt;/li&gt;&lt;li&gt;Cocher : utilitaires système standard + serveur SSH&lt;/li&gt;&lt;li&gt;Installer GRUB sur le MBR (/dev/sda)&lt;/li&gt;&lt;/ol&gt;&lt;h3&gt;Post-installation&lt;/h3&gt;&lt;pre&gt;apt update &amp;amp;&amp;amp; apt upgrade -y&lt;br&gt;apt install sudo curl wget vim git net-tools -y&lt;br&gt;usermod -aG sudo votre_utilisateur&lt;br&gt;reboot&lt;/pre&gt;">
      <div class="res-card__icon">🐧</div>
      <div class="res-card__body">
        <span class="res-card__cat">Système</span>
        <h3 class="res-card__title">Installation Debian 12</h3>
        <p class="res-card__desc">Installation complète de Debian sur VM ou machine physique</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="systeme" data-title="Configuration SSH"
      data-content="&lt;h2&gt;Configuration SSH&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Système&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Installation du serveur SSH&lt;/h3&gt;&lt;pre&gt;apt install openssh-server -y&lt;br&gt;systemctl enable ssh&lt;br&gt;systemctl start ssh&lt;br&gt;systemctl status ssh&lt;/pre&gt;&lt;h3&gt;Configuration (/etc/ssh/sshd_config)&lt;/h3&gt;&lt;pre&gt;Port 22&lt;br&gt;PermitRootLogin no&lt;br&gt;PasswordAuthentication yes&lt;br&gt;PubkeyAuthentication yes&lt;br&gt;AuthorizedKeysFile .ssh/authorized_keys&lt;/pre&gt;&lt;h3&gt;Redémarrer après modification&lt;/h3&gt;&lt;pre&gt;systemctl restart ssh&lt;/pre&gt;&lt;h3&gt;Connexion depuis un client&lt;/h3&gt;&lt;pre&gt;ssh utilisateur@adresse_ip&lt;br&gt;ssh -p 22 utilisateur@192.168.1.10&lt;/pre&gt;&lt;h3&gt;Générer une paire de clés (côté client)&lt;/h3&gt;&lt;pre&gt;ssh-keygen -t ed25519 -C &quot;mon@email.com&quot;&lt;br&gt;ssh-copy-id utilisateur@192.168.1.10&lt;/pre&gt;">
      <div class="res-card__icon">🔐</div>
      <div class="res-card__body">
        <span class="res-card__cat">Système</span>
        <h3 class="res-card__title">Configuration SSH</h3>
        <p class="res-card__desc">Installation, configuration et connexion par clé SSH</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="systeme" data-title="Clé SSH Windows → VM Debian"
      data-content="&lt;h2&gt;Clé SSH Windows → VM Debian&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Système&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;1. Générer la clé SSH sur Windows (PowerShell)&lt;/h3&gt;&lt;pre&gt;ssh-keygen -t ed25519 -C &quot;votre@email.com&quot;&lt;br&gt;# Accepter le chemin par défaut : C:\Users\VotreNom\.ssh\id_ed25519&lt;br&gt;ls $env:USERPROFILE\.ssh\&lt;br&gt;# → id_ed25519 (privée) + id_ed25519.pub (publique)&lt;/pre&gt;&lt;h3&gt;2. Copier la clé publique sur la VM&lt;/h3&gt;&lt;pre&gt;type $env:USERPROFILE\.ssh\id_ed25519.pub | ssh utilisateur@192.168.1.10 &quot;mkdir -p ~/.ssh &amp;amp;&amp;amp; cat &gt;&gt; ~/.ssh/authorized_keys&quot;&lt;/pre&gt;&lt;h3&gt;3. Sur la VM — vérifier les permissions&lt;/h3&gt;&lt;pre&gt;chmod 700 ~/.ssh&lt;br&gt;chmod 600 ~/.ssh/authorized_keys&lt;/pre&gt;&lt;h3&gt;4. Activer l'auth par clé dans sshd_config&lt;/h3&gt;&lt;pre&gt;PubkeyAuthentication yes&lt;br&gt;AuthorizedKeysFile .ssh/authorized_keys&lt;br&gt;systemctl restart ssh&lt;/pre&gt;&lt;h3&gt;5. Connexion sans mot de passe&lt;/h3&gt;&lt;pre&gt;ssh utilisateur@192.168.1.10&lt;br&gt;# → Connexion directe sans mot de passe&lt;/pre&gt;&lt;h3&gt;6. Raccourci : fichier config SSH Windows&lt;/h3&gt;&lt;pre&gt;# C:\Users\VotreNom\.ssh\config&lt;br&gt;Host mavm&lt;br&gt;    HostName 192.168.1.10&lt;br&gt;    User utilisateur&lt;br&gt;    IdentityFile ~/.ssh/id_ed25519&lt;br&gt;# Utilisation : ssh mavm&lt;/pre&gt;">
      <div class="res-card__icon">🔑</div>
      <div class="res-card__body">
        <span class="res-card__cat">Système</span>
        <h3 class="res-card__title">Clé SSH Windows → VM Debian</h3>
        <p class="res-card__desc">Générer et déployer une clé SSH de Windows vers une VM Debian</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="systeme" data-title="Gestion des utilisateurs Linux"
      data-content="&lt;h2&gt;Gestion des utilisateurs Linux&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Système&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Créer un utilisateur&lt;/h3&gt;&lt;pre&gt;adduser nomutilisateur&lt;br&gt;# Ou sans interaction :&lt;br&gt;useradd -m -s /bin/bash nomutilisateur&lt;br&gt;passwd nomutilisateur&lt;/pre&gt;&lt;h3&gt;Ajouter au groupe sudo&lt;/h3&gt;&lt;pre&gt;usermod -aG sudo nomutilisateur&lt;/pre&gt;&lt;h3&gt;Supprimer un utilisateur&lt;/h3&gt;&lt;pre&gt;deluser --remove-home nomutilisateur&lt;/pre&gt;&lt;h3&gt;Lister les utilisateurs&lt;/h3&gt;&lt;pre&gt;cat /etc/passwd&lt;br&gt;getent passwd&lt;/pre&gt;&lt;h3&gt;Gérer les groupes&lt;/h3&gt;&lt;pre&gt;usermod -aG docker,sudo nomutilisateur&lt;br&gt;groups nomutilisateur&lt;/pre&gt;">
      <div class="res-card__icon">👤</div>
      <div class="res-card__body">
        <span class="res-card__cat">Système</span>
        <h3 class="res-card__title">Gestion des utilisateurs Linux</h3>
        <p class="res-card__desc">Créer, modifier, supprimer des comptes et gérer les groupes</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <!-- ══ RÉSEAU ══ -->
    <button class="res-card" data-cat="reseau" data-title="Configuration réseau Debian"
      data-content="&lt;h2&gt;Configuration réseau Debian&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Réseau&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Voir les interfaces&lt;/h3&gt;&lt;pre&gt;ip a&lt;br&gt;ip link show&lt;/pre&gt;&lt;h3&gt;IP statique (/etc/network/interfaces)&lt;/h3&gt;&lt;pre&gt;auto eth0&lt;br&gt;iface eth0 inet static&lt;br&gt;  address 192.168.1.10&lt;br&gt;  netmask 255.255.255.0&lt;br&gt;  gateway 192.168.1.1&lt;br&gt;  dns-nameservers 8.8.8.8 1.1.1.1&lt;/pre&gt;&lt;h3&gt;Redémarrer le réseau&lt;/h3&gt;&lt;pre&gt;systemctl restart networking&lt;br&gt;ifdown eth0 &amp;amp;&amp;amp; ifup eth0&lt;/pre&gt;&lt;h3&gt;Vérification&lt;/h3&gt;&lt;pre&gt;ip a&lt;br&gt;ping -c 4 8.8.8.8&lt;br&gt;ping -c 4 google.com&lt;/pre&gt;">
      <div class="res-card__icon">🌐</div>
      <div class="res-card__body">
        <span class="res-card__cat">Réseau</span>
        <h3 class="res-card__title">Configuration réseau Debian</h3>
        <p class="res-card__desc">IP statique, passerelle et DNS sous Debian</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="reseau" data-title="Commandes réseau utiles"
      data-content="&lt;h2&gt;Commandes réseau utiles&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Réseau&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Afficher la configuration&lt;/h3&gt;&lt;pre&gt;ip a               # Adresses IP&lt;br&gt;ip route show      # Table de routage&lt;br&gt;ip neigh           # Table ARP&lt;/pre&gt;&lt;h3&gt;Diagnostics&lt;/h3&gt;&lt;pre&gt;ping -c 4 8.8.8.8&lt;br&gt;traceroute 8.8.8.8&lt;br&gt;nslookup google.com&lt;br&gt;dig google.com&lt;/pre&gt;&lt;h3&gt;Ports ouverts&lt;/h3&gt;&lt;pre&gt;ss -tuln           # Ports en écoute&lt;br&gt;ss -tunp           # Avec processus&lt;br&gt;nmap -sV 192.168.1.0/24  # Scanner réseau&lt;/pre&gt;&lt;h3&gt;Capture de paquets&lt;/h3&gt;&lt;pre&gt;tcpdump -i eth0 -n&lt;br&gt;tcpdump -i eth0 port 80&lt;/pre&gt;">
      <div class="res-card__icon">📡</div>
      <div class="res-card__body">
        <span class="res-card__cat">Réseau</span>
        <h3 class="res-card__title">Commandes réseau utiles</h3>
        <p class="res-card__desc">Diagnostic, interfaces, ports et capture de paquets</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <!-- ══ DOCKER ══ -->
    <button class="res-card" data-cat="docker" data-title="Docker — bases et commandes"
      data-content="&lt;h2&gt;Docker — bases et commandes&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Docker&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Installation Docker sur Debian&lt;/h3&gt;&lt;pre&gt;apt update&lt;br&gt;apt install ca-certificates curl gnupg -y&lt;br&gt;install -m 0755 -d /etc/apt/keyrings&lt;br&gt;curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg&lt;br&gt;echo &quot;deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release &amp;amp;&amp;amp; echo $VERSION_CODENAME) stable&quot; | tee /etc/apt/sources.list.d/docker.list&lt;br&gt;apt update&lt;br&gt;apt install docker-ce docker-ce-cli containerd.io docker-compose-plugin -y&lt;br&gt;systemctl enable docker &amp;amp;&amp;amp; systemctl start docker&lt;br&gt;usermod -aG docker $USER&lt;/pre&gt;&lt;h3&gt;Commandes essentielles&lt;/h3&gt;&lt;pre&gt;docker ps                    # Containers actifs&lt;br&gt;docker ps -a                 # Tous les containers&lt;br&gt;docker images                # Images locales&lt;br&gt;docker pull nginx:latest     # Télécharger une image&lt;br&gt;docker run -d -p 80:80 --name monsite nginx&lt;br&gt;docker stop monsite&lt;br&gt;docker rm monsite&lt;br&gt;docker logs monsite&lt;br&gt;docker exec -it monsite bash&lt;/pre&gt;&lt;h3&gt;Docker Compose&lt;/h3&gt;&lt;pre&gt;docker compose up -d&lt;br&gt;docker compose down&lt;br&gt;docker compose ps&lt;br&gt;docker compose logs -f&lt;/pre&gt;&lt;h3&gt;Volumes et réseau&lt;/h3&gt;&lt;pre&gt;docker volume ls&lt;br&gt;docker volume create monvol&lt;br&gt;docker network ls&lt;br&gt;docker network create monreseau&lt;/pre&gt;">
      <div class="res-card__icon">🐳</div>
      <div class="res-card__body">
        <span class="res-card__cat">Docker</span>
        <h3 class="res-card__title">Docker — bases et commandes</h3>
        <p class="res-card__desc">Installation, commandes essentielles, volumes et réseaux Docker</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="docker" data-title="Docker WordPress + MySQL — Docker Compose"
      data-content="&lt;h2&gt;Docker WordPress + MySQL — Docker Compose&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Docker&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Architecture&lt;/h3&gt;&lt;p&gt;Deux containers séparés dans deux dossiers distincts, interconnectés via un réseau Docker &lt;strong&gt;external&lt;/strong&gt; nommé wp_network.&lt;/p&gt;&lt;pre&gt;projet/&lt;br&gt;├── mysql/&lt;br&gt;│   └── docker-compose.yml&lt;br&gt;└── wordpress/&lt;br&gt;    └── docker-compose.yml&lt;/pre&gt;&lt;h3&gt;Étape 1 — Créer le réseau partagé&lt;/h3&gt;&lt;pre&gt;docker network create wp_network&lt;/pre&gt;&lt;h3&gt;Étape 2 — docker-compose.yml MySQL&lt;/h3&gt;&lt;pre&gt;services:&lt;br&gt;  mysql:&lt;br&gt;    image: mysql:8.0&lt;br&gt;    container_name: mysql_wp&lt;br&gt;    restart: always&lt;br&gt;    environment:&lt;br&gt;      MYSQL_ROOT_PASSWORD: rootpassword&lt;br&gt;      MYSQL_DATABASE: wordpress&lt;br&gt;      MYSQL_USER: wpuser&lt;br&gt;      MYSQL_PASSWORD: wppassword&lt;br&gt;    volumes:&lt;br&gt;      - mysql_data:/var/lib/mysql&lt;br&gt;    networks:&lt;br&gt;      - wp_network&lt;br&gt;volumes:&lt;br&gt;  mysql_data:&lt;br&gt;networks:&lt;br&gt;  wp_network:&lt;br&gt;    external: true&lt;/pre&gt;&lt;h3&gt;Étape 3 — docker-compose.yml WordPress&lt;/h3&gt;&lt;pre&gt;services:&lt;br&gt;  wordpress:&lt;br&gt;    image: wordpress:latest&lt;br&gt;    container_name: wordpress_app&lt;br&gt;    restart: always&lt;br&gt;    ports:&lt;br&gt;      - &quot;8080:80&quot;&lt;br&gt;    environment:&lt;br&gt;      WORDPRESS_DB_HOST: mysql_wp:3306&lt;br&gt;      WORDPRESS_DB_NAME: wordpress&lt;br&gt;      WORDPRESS_DB_USER: wpuser&lt;br&gt;      WORDPRESS_DB_PASSWORD: wppassword&lt;br&gt;    volumes:&lt;br&gt;      - wordpress_data:/var/www/html&lt;br&gt;    networks:&lt;br&gt;      - wp_network&lt;br&gt;volumes:&lt;br&gt;  wordpress_data:&lt;br&gt;networks:&lt;br&gt;  wp_network:&lt;br&gt;    external: true&lt;/pre&gt;&lt;h3&gt;Étape 4 — Démarrage&lt;/h3&gt;&lt;pre&gt;# 1. D'abord MySQL :&lt;br&gt;cd mysql/ &amp;amp;&amp;amp; docker compose up -d&lt;br&gt;# 2. Ensuite WordPress :&lt;br&gt;cd ../wordpress/ &amp;amp;&amp;amp; docker compose up -d&lt;br&gt;# 3. Vérifier :&lt;br&gt;docker ps&lt;/pre&gt;&lt;h3&gt;Accès&lt;/h3&gt;&lt;pre&gt;http://localhost:8080&lt;br&gt;# Suivre l'assistant WordPress — DB déjà configurée&lt;/pre&gt;">
      <div class="res-card__icon">🗃️</div>
      <div class="res-card__body">
        <span class="res-card__cat">Docker</span>
        <h3 class="res-card__title">Docker WordPress + MySQL</h3>
        <p class="res-card__desc">Deux Docker Compose séparés interconnectés via un réseau externe partagé</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="docker" data-title="Apache2 + Docker Compose + SSH GitHub"
      data-content="&lt;h2&gt;Apache2 + Docker Compose + Déploiement via GitHub SSH&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;Catégorie :&lt;/strong&gt; Docker / Services&lt;/p&gt;&lt;hr&gt;&lt;h3&gt;Architecture&lt;/h3&gt;&lt;p&gt;Apache2 dans un container Docker, le site est cloné depuis GitHub via SSH et monté comme volume.&lt;/p&gt;&lt;h3&gt;Étape 1 — Clé SSH de la VM vers GitHub&lt;/h3&gt;&lt;pre&gt;ssh-keygen -t ed25519 -C &quot;deploy@monserveur&quot;&lt;br&gt;cat ~/.ssh/id_ed25519.pub&lt;br&gt;# Copier cette clé dans GitHub → Settings → SSH keys&lt;br&gt;ssh -T git@github.com   # Tester la connexion&lt;/pre&gt;&lt;h3&gt;Étape 2 — Cloner le dépôt sur la VM&lt;/h3&gt;&lt;pre&gt;cd /opt&lt;br&gt;git clone git@github.com:VotreUser/votre-repo.git monsite&lt;/pre&gt;&lt;h3&gt;Étape 3 — docker-compose.yml Apache2&lt;/h3&gt;&lt;pre&gt;services:&lt;br&gt;  apache:&lt;br&gt;    image: httpd:2.4&lt;br&gt;    container_name: apache_site&lt;br&gt;    restart: always&lt;br&gt;    ports:&lt;br&gt;      - &quot;80:80&quot;&lt;br&gt;    volumes:&lt;br&gt;      - /opt/monsite:/usr/local/apache2/htdocs/&lt;br&gt;    environment:&lt;br&gt;      - TZ=Europe/Paris&lt;/pre&gt;&lt;h3&gt;Étape 4 — Démarrer&lt;/h3&gt;&lt;pre&gt;docker compose up -d&lt;br&gt;docker logs apache_site&lt;/pre&gt;&lt;h3&gt;Étape 5 — Déployer les mises à jour&lt;/h3&gt;&lt;pre&gt;cd /opt/monsite&lt;br&gt;git pull origin main&lt;br&gt;# Apache sert automatiquement les nouveaux fichiers&lt;/pre&gt;&lt;h3&gt;Commandes Git de déploiement&lt;/h3&gt;&lt;pre&gt;git status              # État&lt;br&gt;git pull origin main    # Récupérer MAJ&lt;br&gt;git log --oneline -5    # Derniers commits&lt;br&gt;git diff                # Voir changements&lt;/pre&gt;">
      <div class="res-card__icon">🚀</div>
      <div class="res-card__body">
        <span class="res-card__cat">Docker</span>
        <h3 class="res-card__title">Apache2 + Docker + GitHub SSH</h3>
        <p class="res-card__desc">Héberger un site avec Apache2 en Docker, déploiement via clé SSH GitHub</p>
      </div>
      <svg class="res-card__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <button class="res-card" data-cat="services" data-title="Installation Apache2"

<!-- Panel procédure -->
<div class="overlay" id="resOverlay"></div>
<aside class="res-panel" id="resPanel" role="dialog" aria-modal="true" aria-label="Procédure">
  <div class="res-panel__header">
    <h2 class="res-panel__title" id="resPanelTitle"></h2>
    <div style="display:flex;gap:.4rem;align-items:center;">
      <button class="popup__close" id="resPanelExpand" aria-label="Agrandir" title="Agrandir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
      </button>
      <button class="popup__close" id="resPanelClose" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  <div class="res-panel__body" id="resPanelBody"></div>
</aside>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const cards      = document.querySelectorAll('.res-card');
const filters    = document.querySelectorAll('.res-filter');
const search     = document.getElementById('resSearch');
const noResult   = document.getElementById('resNoResult');
const querySpan  = document.getElementById('resQuery');
const overlay    = document.getElementById('resOverlay');
const panel      = document.getElementById('resPanel');
const panelTitle = document.getElementById('resPanelTitle');
const panelBody  = document.getElementById('resPanelBody');
const panelClose = document.getElementById('resPanelClose');
const panelExpand= document.getElementById('resPanelExpand');

let isExpanded = false;

function openPanel(title, content) {
  panelTitle.textContent = title;
  panelBody.innerHTML    = content;
  overlay.classList.add('is-visible');
  panel.classList.add('is-open');
  if (isExpanded) panel.classList.add('is-expanded');
  document.body.style.overflow = 'hidden';
}
function closePanel() {
  overlay.classList.remove('is-visible');
  panel.classList.remove('is-open');
  document.body.style.overflow = '';
}

panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

panelExpand.addEventListener('click', () => {
  isExpanded = !isExpanded;
  panel.classList.toggle('is-expanded', isExpanded);
  panelExpand.title = isExpanded ? 'Réduire' : 'Agrandir';
  panelExpand.innerHTML = isExpanded
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>`;
});

cards.forEach(c => c.addEventListener('click', () => openPanel(c.dataset.title, c.dataset.content)));

let activeCat = 'all';
filters.forEach(btn => {
  btn.addEventListener('click', () => {
    filters.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  });
});

search.addEventListener('input', applyFilters);
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); search.focus(); }
  if (e.key === 'Escape') closePanel();
});

function applyFilters() {
  const q = search.value.trim().toLowerCase();
  let n = 0;
  cards.forEach(c => {
    const matchCat    = activeCat === 'all' || c.dataset.cat === activeCat;
    const matchSearch = !q || c.dataset.title.toLowerCase().includes(q) || c.querySelector('.res-card__desc').textContent.toLowerCase().includes(q);
    const visible = matchCat && matchSearch;
    c.style.display = visible ? '' : 'none';
    if (visible) n++;
  });
  noResult.style.display = n === 0 ? 'block' : 'none';
  querySpan.textContent  = q || activeCat;
}
</script>
<script src="../js/shared.js"></script>
