<!-- ══ POPUP PROCÉDURE (par-dessus la popup catégorie) ══ -->
<div class="overlay-proc" id="procOverlay"></div>
<div class="proc-popup" id="procPopup" role="dialog" aria-modal="true">
  <div class="proc-popup__box">
    <div class="proc-popup__header">
      <h3 class="proc-popup__title" id="procPopupTitle"></h3>
      <div style="display:flex;gap:.4rem;align-items:center;">
        <!-- Bouton modifier admin (visible seulement si connecté) -->
        <button class="popup__close admin-edit-btn" id="procEditBtn" style="display:none" title="Modifier (admin)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="popup__close" id="procPopupClose" aria-label="Fermer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="proc-popup__body" id="procPopupBody"></div>
  </div>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const AUTH_KEY = 'admin_auth_py';
const isAdmin  = () => sessionStorage.getItem(AUTH_KEY) === '1';

/* ── Toutes les cartes (source de données) ── */
const cards = [...document.querySelectorAll('.res-card')];

/* ── Compteurs par catégorie ── */
['systeme','reseau','web','bdd','outils'].forEach(cat => {
  const n = cards.filter(c => c.dataset.cat === cat).length;
  const el = document.getElementById('cnt-' + cat);
  if (el) el.textContent = n;
});

/* ══════════════════════════════
   POPUP CATÉGORIE
══════════════════════════════ */
const catOverlay   = document.getElementById('catOverlay');
const catPopup     = document.getElementById('catPopup');
const catPopupClose= document.getElementById('catPopupClose');
const catPopupTitle= document.getElementById('catPopupTitle');
const catPopupLabel= document.getElementById('catPopupLabel');
const catPopupList = document.getElementById('catPopupList');

const CAT_META = {
  systeme: { title: 'Système',         icon: '🐧', label: 'BTS SIO · Système' },
  reseau:  { title: 'Réseau',          icon: '🌐', label: 'BTS SIO · Réseau' },
  web:     { title: 'Docker',          icon: '🐳', label: 'BTS SIO · Docker' },
  bdd:     { title: 'Base de données', icon: '🗄️', label: 'BTS SIO · BDD' },
  outils:  { title: 'Outils',          icon: '⚙️', label: 'BTS SIO · Outils' },
};

function openCatPopup(cat) {
  const meta = CAT_META[cat] || {};
  catPopupTitle.textContent = meta.title || cat;
  catPopupLabel.textContent = meta.label || '';

  const catCards = cards.filter(c => c.dataset.cat === cat);
  catPopupList.innerHTML = catCards.map(c => `
    <button class="proc-item" data-title="${c.dataset.title}" data-content="${c.dataset.content.replace(/"/g,'&quot;')}">
      <div class="proc-item__left">
        <span class="proc-item__title">${c.dataset.title}</span>
        <span class="proc-item__desc">${c.querySelector('.res-card__desc')?.textContent || ''}</span>
      </div>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:1rem;height:1rem;flex-shrink:0;color:var(--text-dim)"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  `).join('');

  /* Ouvrir la procédure au clic sur un item */
  catPopupList.querySelectorAll('.proc-item').forEach(btn => {
    btn.addEventListener('click', () => openProcPopup(btn.dataset.title, btn.dataset.content));
  });

  catOverlay.classList.add('is-visible');
  catPopup.classList.add('is-open');
  document.body.style.overflow = 'hidden';
}

function closeCatPopup() {
  catOverlay.classList.remove('is-visible');
  catPopup.classList.remove('is-open');
  closeProcPopup();
  document.body.style.overflow = '';
}

catPopupClose.addEventListener('click', closeCatPopup);
catOverlay.addEventListener('click', closeCatPopup);

/* Clic sur les grandes cartes catégories */
document.querySelectorAll('.cat-card').forEach(card => {
  card.addEventListener('click', () => openCatPopup(card.dataset.cat));
});

/* ══════════════════════════════
   POPUP PROCÉDURE
══════════════════════════════ */
const procOverlay   = document.getElementById('procOverlay');
const procPopup     = document.getElementById('procPopup');
const procPopupClose= document.getElementById('procPopupClose');
const procPopupTitle= document.getElementById('procPopupTitle');
const procPopupBody = document.getElementById('procPopupBody');
const procEditBtn   = document.getElementById('procEditBtn');

let currentProcTitle   = '';
let currentProcContent = '';

function openProcPopup(title, content) {
  currentProcTitle   = title;
  currentProcContent = content;
  procPopupTitle.textContent = title;
  procPopupBody.innerHTML    = content;
  procEditBtn.style.display  = isAdmin() ? 'flex' : 'none';
  procOverlay.classList.add('is-visible');
  procPopup.classList.add('is-open');
}

function closeProcPopup() {
  procOverlay.classList.remove('is-visible');
  procPopup.classList.remove('is-open');
}

procPopupClose.addEventListener('click', closeProcPopup);
procOverlay.addEventListener('click', closeProcPopup);

/* Bouton modifier admin → redirige vers admin.html avec données pré-remplies */
procEditBtn.addEventListener('click', () => {
  const card = cards.find(c => c.dataset.title === currentProcTitle);
  if (!card) return;
  const params = new URLSearchParams({
    edit: 'proc',
    title:   currentProcTitle,
    cat:     card.dataset.cat,
    desc:    card.querySelector('.res-card__desc')?.textContent || '',
    content: currentProcContent,
  });
  window.open('../admin.html?' + params.toString(), '_blank');
});

/* ══════════════════════════════
   RECHERCHE
══════════════════════════════ */
const search   = document.getElementById('resSearch');
const resGrid  = document.getElementById('resGrid');
const catGrid  = document.getElementById('catGrid');
const noResult = document.getElementById('resNoResult');
const querySpan= document.getElementById('resQuery');

search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  if (!q) {
    resGrid.style.display = 'none';
    catGrid.style.display = 'grid';
    noResult.style.display = 'none';
    return;
  }
  catGrid.style.display = 'none';
  resGrid.style.display = 'grid';
  let n = 0;
  cards.forEach(c => {
    const match = c.dataset.title.toLowerCase().includes(q)
      || (c.querySelector('.res-card__desc')?.textContent.toLowerCase().includes(q));
    c.style.display = match ? '' : 'none';
    if (match) {
      n++;
      c.onclick = () => openProcPopup(c.dataset.title, c.dataset.content);
    }
  });
  noResult.style.display = n === 0 ? 'block' : 'none';
  querySpan.textContent  = q;
});

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); search.focus(); }
  if (e.key === 'Escape') {
    if (procPopup.classList.contains('is-open')) closeProcPopup();
    else if (catPopup.classList.contains('is-open')) closeCatPopup();
    else search.value = '' || search.dispatchEvent(new Event('input'));
  }
});
</script>
<script src="../js/shared.js"></script>
</body>
